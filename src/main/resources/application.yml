spring:
  application:
    name: bfa-espacial
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
app:
  imagenes:
    base-url: /img       # §19 Q3 — image store root; switch local<->CDN here, not in code
  integracion:
    json-format: SNAKE   # CAMEL | SNAKE — Dashboard payload key style (§19 Q4); default snake_case

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
  error:
    include-stacktrace: never   # never leak stack traces to the browser
    include-message: always
    include-exception: false
