spring:
  application:
    name: bfa-espacial
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true   # RFC7807 JSON errors for REST, no stack traces

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8080
  error:
    include-stacktrace: never   # never leak stack traces to the browser
    include-message: always
    include-exception: false
