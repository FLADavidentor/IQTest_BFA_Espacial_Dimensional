<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Revisión de respuestas</title></head>
<body>
  <h1>Revisión de respuestas</h1>
  <p>CIF <span th:text="${cif}">—</span> · Periodo <span th:text="${periodo}">—</span></p>
  <table border="1">
    <tr><th>Subtest</th><th>Ítem</th><th>Respuesta estudiante</th><th>Correcta</th><th>¿Acierto?</th></tr>
    <tr th:each="i : ${items}">
      <td th:text="${i.tipoSubtest}">—</td>
      <td th:text="${i.imagenUrl}">—</td>
      <td th:text="${i.respuestaEstudiante}">—</td>
      <td th:text="${i.respuestaCorrecta}">—</td>
      <td th:text="${i.correcta} ? 'Sí' : 'No'">—</td>
    </tr>
  </table>
</body>
</html>
