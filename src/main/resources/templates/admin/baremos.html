<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Admin · Baremos</title></head>
<body>
  <div style="background-color: #f1f5f9; padding: 10px 20px; border-bottom: 1px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center;" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div>
      <strong>Usuario:</strong> <span sec:authentication="name">User</span> | 
      <strong>Rol actual:</strong> <span sec:authentication="principal.authorities">Rol</span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" style="background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Cerrar Sesión</button>
    </form>
  </div>
  <h1>Baremo</h1>
  <table border="1">
    <tr><th>Factor</th><th>Puntuación directa</th><th>Percentil (editar)</th></tr>
    <tr th:each="b : ${baremos}">
      <td th:text="${b.factor}">—</td>
      <td th:text="${b.puntuacionDirecta}">—</td>
      <td>
        <form th:action="@{/admin/baremos}" method="post" style="display:inline">
          <input type="hidden" name="factor" th:value="${b.factor}">
          <input type="hidden" name="puntuacionDirecta" th:value="${b.puntuacionDirecta}">
          <input type="number" name="percentil" th:value="${b.percentil}">
          <button type="submit">Guardar</button>
        </form>
      </td>
    </tr>
  </table>
</body>
</html>
