<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Gestión de Reactivos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}" href="/css/admin.css">
</head>
<body>
  <!-- Session Header -->
  <div class="user-bar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="user-info">
      <strong>Usuario:</strong> <span sec:authentication="name">User</span> | 
      <strong>Rol:</strong> <span sec:authentication="principal.authorities">Rol</span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" class="logout-btn">Cerrar Sesión</button>
    </form>
  </div>

  <div class="container">
    <h1>Panel de Administración</h1>

    <!-- Admin Top Nav Bar -->
    <div class="admin-nav">
      <a th:href="@{/admin/reactivos}" class="active">Reactivos</a>
      <a th:href="@{/admin/versiones}">Versiones</a>
      <a th:href="@{/admin/imagenes}">Subir Imágenes</a>
      <a th:href="@{/admin/baremos}">Baremos</a>
      <a th:href="@{/admin/usuarios}">Usuarios</a>
      <a th:href="@{/resultados}">Historial de Resultados</a>
    </div>

    <!-- Formulario Reactivo -->
    <div class="card">
      <h2 th:text="${form.id} == null ? 'Nuevo Reactivo' : 'Editar Reactivo'">Nuevo Reactivo</h2>
      <form th:action="@{/admin/reactivos}" th:object="${form}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="form-row">
          <div class="form-group">
            <label for="versionFormularioId">Versión de Formulario</label>
            <select th:field="*{versionFormularioId}">
              <option th:each="v : ${versiones}" th:value="${v.id}"
                      th:text="${v.anio} + ' v' + ${v.numeroVersion}">v</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tipoSubtest">Subtest BFA</label>
            <select th:field="*{tipoSubtest}">
              <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}">t</option>
            </select>
          </div>
          <div class="form-group">
            <label for="orden">Orden / N° Ítem</label>
            <input type="number" th:field="*{orden}" required>
          </div>
        </div>
        <div class="form-group">
          <label for="enunciadoImagenUrl">Imagen URL</label>
          <input type="text" th:field="*{enunciadoImagenUrl}" placeholder="ej: /img/s1a/reactivo_1.png" required>
        </div>
        <div class="form-group">
          <label for="enunciadoTexto">Texto del Enunciado (Opcional)</label>
          <textarea th:field="*{enunciadoTexto}" placeholder="Texto opcional a mostrar con la imagen..."></textarea>
        </div>
        <button type="submit" class="btn-primary">Guardar Reactivo</button>
      </form>
    </div>

    <!-- Listado Reactivos -->
    <div class="card" style="padding-top: 15px;">
      <h2>Listado General</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Subtest</th>
            <th>Orden</th>
            <th>Imagen</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="r : ${reactivos}">
            <td th:text="${r.id}" style="color: var(--text-muted);">1</td>
            <td>
              <span th:text="${r.tipoSubtest}" class="badge badge-info">S1A</span>
            </td>
            <td th:text="${r.orden}" style="font-weight: 500;">1</td>
            <td th:text="${r.enunciadoImagenUrl}" style="font-family: monospace; font-size: 0.85rem;">/img/s1a/...</td>
            <td>
              <span th:if="${r.activo}" class="badge badge-success">Activo</span>
              <span th:unless="${r.activo}" class="badge badge-danger">Inactivo</span>
            </td>
            <td>
              <a th:href="@{|/admin/reactivos/${r.id}/editar|}" class="action-link">Editar</a>
              <a th:href="@{|/admin/reactivos/${r.id}/opciones|}" class="action-link">Opciones</a>
              <form th:action="@{|/admin/reactivos/${r.id}/eliminar|}" method="post" style="display:inline">
                <button type="submit" class="btn-danger-link" onclick="return confirm('¿Seguro que desea desactivar este reactivo?')">Eliminar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
