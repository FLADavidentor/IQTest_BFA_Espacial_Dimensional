<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Admin · Reactivos</title></head>
<body>
  <div style="background-color: #f1f5f9; padding: 10px 20px; border-bottom: 1px solid #cbd5e1; display: flex; justify-content: space-between; align-items: center;" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div>
      <strong>Usuario:</strong> <span sec:authentication="name">User</span> | 
      <strong>Rol actual:</strong> <span sec:authentication="principal.authorities">Rol</span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" style="background-color: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer;">Cerrar Sesión</button>
    </form>
  </div>
  <h1>Reactivos</h1>
  <p><a th:href="@{/admin/imagenes}">Subir imagen</a></p>

  <h2 th:text="${form.id} == null ? 'Nuevo reactivo' : 'Editar reactivo'">Nuevo</h2>
  <form th:action="@{/admin/reactivos}" th:object="${form}" method="post">
    <input type="hidden" th:field="*{id}">
    <label>Versión:
      <select th:field="*{versionFormularioId}">
        <option th:each="v : ${versiones}" th:value="${v.id}"
                th:text="${v.anio} + ' v' + ${v.numeroVersion}">v</option>
      </select>
    </label><br>
    <label>Subtest:
      <select th:field="*{tipoSubtest}">
        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}">t</option>
      </select>
    </label><br>
    <label>Orden: <input type="number" th:field="*{orden}"></label><br>
    <label>Imagen URL: <input type="text" th:field="*{enunciadoImagenUrl}" size="40"></label><br>
    <label>Texto (opcional): <textarea th:field="*{enunciadoTexto}"></textarea></label><br>
    <button type="submit">Guardar</button>
  </form>

  <h2>Listado</h2>
  <table border="1">
    <tr><th>ID</th><th>Subtest</th><th>Orden</th><th>Imagen</th><th>Activo</th><th></th></tr>
    <tr th:each="r : ${reactivos}">
      <td th:text="${r.id}">—</td>
      <td th:text="${r.tipoSubtest}">—</td>
      <td th:text="${r.orden}">—</td>
      <td th:text="${r.enunciadoImagenUrl}">—</td>
      <td th:text="${r.activo} ? 'Sí' : 'No'">—</td>
      <td>
        <a th:href="@{|/admin/reactivos/${r.id}/editar|}">Editar</a>
        <a th:href="@{|/admin/reactivos/${r.id}/opciones|}">Opciones</a>
        <form th:action="@{|/admin/reactivos/${r.id}/eliminar|}" method="post" style="display:inline">
          <button type="submit">Eliminar</button>
        </form>
      </td>
    </tr>
  </table>
</body>
</html>
