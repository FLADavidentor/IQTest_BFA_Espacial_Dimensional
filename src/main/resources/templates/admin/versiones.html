<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Versiones de Formulario</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --success-color: #10b981;
      --danger-color: #ef4444;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .user-bar {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border-bottom: 1px solid var(--border-color);
      padding: 12px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .user-info strong {
      color: var(--text-main);
    }
    .logout-btn {
      background-color: var(--danger-color);
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .logout-btn:hover {
      opacity: 0.9;
    }
    .container {
      width: 100%;
      max-width: 1000px;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    h1, h2 {
      font-family: 'Outfit', sans-serif;
      margin-top: 0;
    }
    .admin-nav {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      background: var(--card-bg);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      flex-wrap: wrap;
    }
    .admin-nav a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background-color 0.2s, color 0.2s;
    }
    .admin-nav a:hover, .admin-nav a.active {
      background-color: var(--primary-color);
      color: white;
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .form-row .form-group {
      flex: 1;
      min-width: 200px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 35px;
    }
    .checkbox-container input {
      width: auto;
      cursor: pointer;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }
    .btn-activate {
      background-color: var(--success-color);
      color: white;
      padding: 6px 12px;
      font-size: 0.85rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-activate:hover {
      opacity: 0.9;
    }
    .btn-activate:disabled {
      background-color: rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-success {
      background-color: rgba(16, 185, 129, 0.2);
      color: var(--success-color);
    }
    .badge-danger {
      background-color: rgba(239, 68, 68, 0.2);
      color: var(--danger-color);
    }
  </style>
</head>
<body>
  <!-- Session Header -->
  <div class="user-bar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="user-info">
      <strong>Usuario:</strong> <span sec:authentication="name">User</span> | 
      <strong>Rol:</strong> <span sec:authentication="principal.authorities">Rol</span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" class="logout-btn">Cerrar Sesión</button>
    </form>
  </div>

  <div class="container">
    <h1>Panel de Administración</h1>

    <!-- Admin Top Nav Bar -->
    <div class="admin-nav">
      <a th:href="@{/admin/reactivos}">Reactivos</a>
      <a th:href="@{/admin/versiones}" class="active">Versiones</a>
      <a th:href="@{/admin/imagenes}">Subir Imágenes</a>
      <a th:href="@{/admin/baremos}">Baremos</a>
      <a th:href="@{/admin/usuarios}">Usuarios</a>
      <a th:href="@{/resultados}">Historial de Resultados</a>
    </div>

    <div th:if="${error}" th:text="${error}" style="background-color: rgba(239,68,68,0.15); border: 1px solid var(--danger-color); color: #f87171; padding: 12px; border-radius: 8px; margin-bottom: 20px;">error</div>

    <!-- Nueva versión de formulario -->
    <div class="card">
      <h2>Nueva Versión de Formulario</h2>
      <form th:action="@{/admin/versiones}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label for="anio">Año de Aplicación</label>
            <input type="number" id="anio" name="anio" placeholder="ej: 2026" required>
          </div>
          <div class="form-group">
            <label for="numeroVersion">Número de Versión</label>
            <input type="number" id="numeroVersion" name="numeroVersion" placeholder="ej: 1" required>
          </div>
          <div class="form-group">
            <div class="checkbox-container">
              <input type="checkbox" id="activa" name="activa" value="true">
              <label for="activa" style="display:inline; margin: 0; cursor:pointer;">Activar inmediatamente</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn-primary">Crear Versión</button>
      </form>
    </div>

    <!-- Listado de versiones -->
    <div class="card" style="padding-top: 15px;">
      <h2>Listado General</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Año</th>
            <th>Número de Versión</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="v : ${versiones}">
            <td th:text="${v.id}" style="color: var(--text-muted);">1</td>
            <td th:text="${v.anio}" style="font-weight: 500;">2026</td>
            <td th:text="${v.numeroVersion}">1</td>
            <td>
              <span th:if="${v.activa}" class="badge badge-success">Activa</span>
              <span th:unless="${v.activa}" class="badge badge-danger">Inactiva</span>
            </td>
            <td>
              <form th:action="@{|/admin/versiones/${v.id}/activar|}" method="post" style="display:inline">
                <input type="hidden" name="confirmar" value="true">
                <button type="submit" class="btn-activate" th:disabled="${v.activa}">
                  Activar (Desactiva las demás del año)
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
