<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Versiones de Formulario</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}" href="/css/admin.css">
</head>
<body>
  <!-- Session Header -->
  <div class="user-bar" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="user-info">
      <strong>Usuario:</strong> <span sec:authentication="name">User</span> | 
      <strong>Rol:</strong> <span sec:authentication="principal.authorities">Rol</span>
    </div>
    <form th:action="@{/logout}" method="post" style="margin: 0;">
      <button type="submit" class="logout-btn">Cerrar Sesión</button>
    </form>
  </div>

  <div class="container">
    <h1>Panel de Administración</h1>

    <!-- Admin Top Nav Bar -->
    <div class="admin-nav">
      <a th:href="@{/admin/reactivos}">Reactivos</a>
      <a th:href="@{/admin/versiones}" class="active">Versiones</a>
      <a th:href="@{/admin/imagenes}">Subir Imágenes</a>
      <a th:href="@{/admin/baremos}">Baremos</a>
      <a th:href="@{/admin/usuarios}">Usuarios</a>
      <a th:href="@{/resultados}">Historial de Resultados</a>
    </div>

    <div th:if="${error}" th:text="${error}" style="background-color: rgba(239,68,68,0.15); border: 1px solid var(--danger-color); color: #f87171; padding: 12px; border-radius: 8px; margin-bottom: 20px;">error</div>

    <!-- Nueva versión de formulario -->
    <div class="card">
      <h2>Nueva Versión de Formulario</h2>
      <form th:action="@{/admin/versiones}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label for="anio">Año de Aplicación</label>
            <input type="number" id="anio" name="anio" placeholder="ej: 2026" required>
          </div>
          <div class="form-group">
            <label for="numeroVersion">Número de Versión</label>
            <input type="number" id="numeroVersion" name="numeroVersion" placeholder="ej: 1" required>
          </div>
          <div class="form-group">
            <div class="checkbox-container">
              <input type="checkbox" id="activa" name="activa" value="true">
              <label for="activa" style="display:inline; margin: 0; cursor:pointer;">Activar inmediatamente</label>
            </div>
          </div>
        </div>
        <button type="submit" class="btn-primary">Crear Versión</button>
      </form>
    </div>

    <!-- Listado de versiones -->
    <div class="card" style="padding-top: 15px;">
      <h2>Listado General</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Año</th>
            <th>Número de Versión</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="v : ${versiones}">
            <td th:text="${v.id}" style="color: var(--text-muted);">1</td>
            <td th:text="${v.anio}" style="font-weight: 500;">2026</td>
            <td th:text="${v.numeroVersion}">1</td>
            <td>
              <span th:if="${v.activa}" class="badge badge-success">Activa</span>
              <span th:unless="${v.activa}" class="badge badge-danger">Inactiva</span>
            </td>
            <td>
              <form th:action="@{|/admin/versiones/${v.id}/activar|}" method="post" style="display:inline">
                <input type="hidden" name="confirmar" value="true">
                <button type="submit" class="btn-activate" th:disabled="${v.activa}">
                  Activar (Desactiva las demás del año)
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
