<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Gestión de Usuarios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --success-color: #10b981;
      --danger-color: #ef4444;
    }
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 900px;
    }
    h1, h2 {
      font-family: 'Outfit', sans-serif;
      margin-top: 0;
    }
    .header-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: var(--primary-color);
    }
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .form-row .form-group {
      flex: 1;
      min-width: 200px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.6);
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-primary {
      background-color: var(--primary-color);
      color: white;
    }
    .btn-primary:hover {
      background-color: var(--primary-hover);
    }
    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }
    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge-success {
      background-color: rgba(16, 185, 129, 0.2);
      color: var(--success-color);
    }
    .badge-danger {
      background-color: rgba(239, 68, 68, 0.2);
      color: var(--danger-color);
    }
    .btn-danger-link {
      background: none;
      border: none;
      color: var(--danger-color);
      padding: 0;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn-danger-link:hover {
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-nav">
      <h1>Usuarios del Sistema</h1>
      <a th:href="@{/admin/reactivos}" class="back-btn">← Volver al Panel</a>
    </div>

    <!-- Nueva versión de formulario -->
    <div class="card">
      <h2>Crear Nuevo Usuario</h2>
      <form th:action="@{/admin/usuarios}" method="post">
        <div class="form-row">
          <div class="form-group">
            <label for="username">Usuario / Login</label>
            <input type="text" id="username" name="username" placeholder="ej: psicologo_uam" required>
          </div>
          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
          </div>
          <div class="form-group">
            <label for="rol">Rol del Sistema</label>
            <select id="rol" name="rol" required>
              <option value="ROLE_ESTUDIANTE">Estudiante (Aspirante)</option>
              <option value="ROLE_EVALUADOR">Evaluador (Psicólogo)</option>
              <option value="ROLE_ADMIN">Administrador</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary">Registrar Usuario</button>
      </form>
    </div>

    <!-- Listado de usuarios -->
    <div class="card" style="padding-top: 15px;">
      <h2>Listado General</h2>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u : ${usuarios}">
            <td th:text="${u.id}" style="color: var(--text-muted);">1</td>
            <td th:text="${u.username}" style="font-weight: 500;">admin</td>
            <td>
              <span th:text="${u.rol}" class="badge" 
                    th:classappend="${u.rol == 'ROLE_ADMIN' ? 'badge-danger' : (u.rol == 'ROLE_EVALUADOR' ? 'badge-success' : 'btn-secondary')}">
                ROLE_ADMIN
              </span>
            </td>
            <td>
              <span th:if="${u.activo}" class="badge badge-success">Activo</span>
              <span th:unless="${u.activo}" class="badge badge-danger">Inactivo</span>
            </td>
            <td>
              <form th:action="@{|/admin/usuarios/${u.id}/toggle|}" method="post" style="display:inline">
                <button type="submit" class="btn-danger-link" 
                        th:text="${u.activo} ? 'Desactivar' : 'Activar'">
                  Desactivar
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
