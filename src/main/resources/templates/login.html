<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión · IQTest BFA</title>
  <!-- Google Fonts: Outfit and Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --primary-glow: rgba(59, 130, 246, 0.3);
      --error-color: #ef4444;
      --error-bg: rgba(239, 68, 68, 0.1);
      --success-color: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
      background-attachment: fixed;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      margin-bottom: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .logo-uam {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #3b82f6;
      background: linear-gradient(135deg, #3b82f6 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .logo-divider {
      width: 1px;
      height: 20px;
      background-color: var(--border-color);
    }

    .logo-sub {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .alert {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideDown 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .alert-error {
      background-color: var(--error-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--error-color);
    }

    .alert-success {
      background-color: var(--success-bg);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success-color);
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      color: var(--text-main);
      font-family: inherit;
      transition: all 0.2s ease;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px var(--primary-glow);
      background: rgba(15, 23, 42, 0.8);
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-color) 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      margin-top: 10px;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.2);
    }

    .btn-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
      background: linear-gradient(135deg, var(--primary-hover) 0%, #1e40af 100%);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .footer-note a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .footer-note a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="header">
      <div class="logo-container">
        <span class="logo-uam">UAM</span>
        <div class="logo-divider"></div>
        <span class="logo-sub">FIA</span>
      </div>
      <h1 class="title">IQTest BFA</h1>
      <p class="subtitle">Módulo de Aptitud Espacial</p>
    </div>

    <!-- Alert Box for Errors -->
    <div th:if="${param.error}" class="alert alert-error">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
      <span>Credenciales inválidas. Por favor intente de nuevo.</span>
    </div>

    <!-- Alert Box for Successful Logout -->
    <div th:if="${param.logout}" class="alert alert-success">
      <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <span>Sesión cerrada correctamente.</span>
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label for="username" class="form-label">Usuario / CIF</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username" class="form-input" placeholder="Ej. estudiante o admin" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Contraseña</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password" class="form-input" placeholder="Ingrese su contraseña" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn-submit">Iniciar Sesión</button>
    </form>

    <div class="footer-note">
      <span>Desarrollo de Pruebas · Fac. de Ingeniería y Arquitectura</span><br>
      <span>¿Problemas para acceder? Contacte a Soporte Técnico</span>
    </div>
  </div>
</div>

</body>
</html>
