# BFA Espacial Dimensional
# ========================
# git clone ... && cd IQTest_BFA_Espacial_Dimensional
# docker compose up
# Open: http://localhost:8080/login
#
# Credenciales:
#   Admin:      admin / admin123
#   Evaluador:  evaluador / evaluador123
#   Estudiante: estudiante / estudiante123
#
# Ctrl+C para detener.
# docker compose down -v  para borrar datos.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bfa
      POSTGRES_USER: bfa
      POSTGRES_PASSWORD: bfa
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bfa -d bfa"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/bfa
      SPRING_DATASOURCE_USERNAME: bfa
      SPRING_DATASOURCE_PASSWORD: bfa
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
